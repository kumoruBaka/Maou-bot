<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maou-sama — Music Bot</title>
<link rel="icon" href="https://listen.moe/favicon.ico" type="image/x-icon">
<style>
  :root {
    --bg: #0f0b16;
    --bg-deep: #08060c;
    --gold: #c9a24a;
    --gold-soft: #e8d5a3;
    --ink: #ece6f0;
    --ink-dim: #9b91ab;
    --line: rgba(201, 162, 74, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 162, 74, 0.10), transparent),
      radial-gradient(ellipse 60% 40% at 85% 100%, rgba(122, 46, 46, 0.12), transparent),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  .seal {
    width: 96px;
    height: 96px;
    margin: 0 auto 28px;
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(from 180deg, var(--gold), transparent 40%, transparent 60%, var(--gold));
  }

  @media (prefers-reduced-motion: reduce) {
    .seal { animation: none; }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .seal img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: block;
    background: var(--bg-deep);
    object-fit: cover;
  }

  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 14px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 6px var(--gold);
  }

  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: 42px;
    letter-spacing: 0.02em;
    color: var(--gold-soft);
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .honorific {
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 26px;
  }

  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    height: 28px;
    margin-bottom: 28px;
  }

  .waveform span {
    width: 3px;
    background: var(--gold);
    border-radius: 2px;
    opacity: 0.75;
    animation: wave 1.2s ease-in-out infinite;
  }

  .waveform span:nth-child(1) { height: 30%; animation-delay: -1.1s; }
  .waveform span:nth-child(2) { height: 65%; animation-delay: -0.9s; }
  .waveform span:nth-child(3) { height: 100%; animation-delay: -0.7s; }
  .waveform span:nth-child(4) { height: 45%; animation-delay: -0.5s; }
  .waveform span:nth-child(5) { height: 80%; animation-delay: -0.3s; }
  .waveform span:nth-child(6) { height: 35%; animation-delay: -0.1s; }
  .waveform span:nth-child(7) { height: 60%; animation-delay: -0.4s; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .waveform span { animation: none; height: 50% !important; }
  }

  .tagline {
    font-size: 14px;
    color: var(--ink-dim);
    margin-bottom: 10px;
  }
  
  .powered-by {
    font-size: 12px;
    color: var(--gold-soft);
    margin-bottom: 34px;
    opacity: 0.8;
  }

  .btn {
    display: inline-block;
    width: 100%;
    padding: 14px 24px;
    background: var(--gold);
    color: var(--bg-deep);
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-decoration: none;
    border-radius: 10px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px -8px rgba(201, 162, 74, 0.5);
  }

  .btn:focus-visible {
    outline: 2px solid var(--gold-soft);
    outline-offset: 3px;
  }

  footer {
    margin-top: 40px;
    display: flex;
    gap: 18px;
    justify-content: center;
    font-size: 12px;
  }

  footer a {
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  footer a:hover {
    color: var(--gold-soft);
    border-bottom-color: var(--line);
  }

  .credit {
    margin-top: 18px;
    font-size: 11px;
    color: var(--ink-dim);
    opacity: 0.6;
  }

  .credit a { color: inherit; text-decoration: underline; }
</style>
</head>
<body>

  <div class="card">
    <div class="seal">
      <img src="https://cdn.discordapp.com/app-icons/1526849354655076504/229e076f6d8f7b83e648cf6242f3fea6.png?size=256" alt="Maou-sama">
    </div>

    <div class="status"><span class="dot" id="status-dot"></span> <span id="status-text">Online 24/7</span></div>

    <h1>Maou-sama</h1>
    <div class="honorific">Free to Use Music Bot</div>

    <div class="waveform" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <p class="tagline" id="now-playing">Non-stop music streaming in your Discord server.</p>
    <p class="powered-by"><img src="https://listen.moe/favicon.ico" alt="listen.moe" style="width: 12px; height: 12px; vertical-align: middle; margin-right: 4px; border-radius: 2px;">Powered by listen.moe JPOP Radio</p>

    <a class="btn" href="https://discord.com/oauth2/authorize?client_id=1526849354655076504&permissions=36785152&integration_type=0&scope=bot" id="inviteBtn" target="_blank">Invite to Server</a>

    <footer>
      <a href="TOS.html">Terms of Service</a>
      <a href="Privacy.html">Privacy Policy</a>
      <a href="mailto:neko@kumoru.my.id">Contact</a>
    </footer>

    <div class="credit">by <a href="#" target="_blank" rel="noopener">kunomaru (lynlll_)</a></div>
  </div>

<script>
  async function fetchStatus() {
    try {
      const res = await fetch('/api/status');
      const data = await res.json();
      
      document.getElementById('status-text').innerText = `Online • ${data.guilds} Servers`;
      document.getElementById('status-dot').style.background = 'var(--gold)';
      document.getElementById('status-dot').style.boxShadow = '0 0 6px var(--gold)';
      
      if (data.currentSong) {
        const artist = data.currentSong.artists && data.currentSong.artists.length > 0 ? data.currentSong.artists[0].name : 'Unknown';
        document.getElementById('now-playing').innerText = `🎵 ${data.currentSong.title} - ${artist}`;
      } else {
        document.getElementById('now-playing').innerText = 'Non-stop music streaming in your Discord server.';
      }
    } catch (e) {
      document.getElementById('status-text').innerText = 'Offline';
      document.getElementById('status-dot').style.background = '#ff4444';
      document.getElementById('status-dot').style.boxShadow = '0 0 6px #ff4444';
    }
  }
  fetchStatus();
  setInterval(fetchStatus, 5000);
</script>
</body>
</html>
